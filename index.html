<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>シルエットSTLメーカー</title>
    <style>
      .boot-message {
        max-width: 760px;
        margin: 48px auto;
        padding: 24px;
        font-family: system-ui, sans-serif;
        line-height: 1.7;
        color: #17324d;
        background: #f5f8fb;
        border: 1px solid #c6d5e1;
        border-radius: 16px;
      }
    </style>
  </head>
  <body>
    <div id="app" data-loading="true">
      <div class="boot-message">
        <h1>シルエットSTLメーカーを読み込み中です</h1>
        <p>アプリ本体を準備しています。通常は数秒で画面が切り替わります。</p>
        <p>切り替わらない場合は、未ビルドのリポジトリ直下がGitHub Pagesで公開されています。</p>
        <p><strong>対処:</strong> GitHubの Settings → Pages → Source を <strong>GitHub Actions</strong> に変更し、Actionsの「Deploy static app to GitHub Pages」を実行してください。</p>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
    <script>
      window.setTimeout(function () {
        var app = document.getElementById('app');
        if (app && app.dataset.loading === 'true') {
          app.querySelector('.boot-message p:last-child').textContent = 'アプリ本体を読み込めませんでした。Pagesの公開元をGitHub Actionsに変更してから、最新コミットをpushするかworkflow_dispatchで再実行してください。';
        }
      }, 3000);
    </script>
  </body>
</html>
